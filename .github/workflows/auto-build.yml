name: Auto Build QQ Farm Bot UI - Version Based (Update.log Required)

on:
  schedule:
    - cron: '0 */6 * * *'

  workflow_dispatch:
    inputs:
      force_build:
        description: '强制构建'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Sync with upstream (Get latest code)
      run: |
        # 添加上游远程
        if ! git remote | grep -q upstream; then
          git remote add upstream https://github.com/Penty-d/qq-farm-bot-ui.git
        fi

        # 获取上游最新
        git fetch upstream main

        # 重置到上游（确保使用最新代码）
        git reset --hard upstream/main

    - name: Get version from Update.log
      id: version
      run: |
        UPDATE_LOG_URL="https://raw.githubusercontent.com/Penty-d/qq-farm-bot-ui/main/Update.log"

        echo "尝试从Update.log获取版本号..."
        echo "URL: $UPDATE_LOG_URL"

        # 测试访问
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$UPDATE_LOG_URL")

        if [ "$HTTP_CODE" = "200" ]; then
          echo "✅ Update.log文件存在 (HTTP $HTTP_CODE)"

          # 获取版本号
          VERSION=$(curl -s "$UPDATE_LOG_URL" | \
            grep -oP "后端：v\K[0-9]+\.[0-9]+\.[0-9]+" | \
            head -1)

          if [ -z "$VERSION" ]; then
            VERSION=$(curl -s "$UPDATE_LOG_URL" | \
              grep -oP "v[0-9]+\.[0-9]+\.[0-9]+" | \
              head -1 | \
              sed 's/^v//')
          fi

          if [ -n "$VERSION" ]; then
            echo "✅ 从Update.log获取版本: $VERSION"
          else
            echo "❌ 无法从Update.log提取版本号"
            echo "Update.log内容:"
            curl -s "$UPDATE_LOG_URL" | head -10
            exit 1
          fi
        else
          echo "❌ Update.log文件不存在或无法访问 (HTTP $HTTP_CODE)"
          echo "跳过构建，不更新Docker镜像"
          exit 1
        fi

        # 生成完整版本号
        BUILD_TIME=$(date +%Y%m%d-%H%M%S)
        FULL_VERSION="${VERSION}-${BUILD_TIME}"

        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
        echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT

    - name: Check for updates
      id: check
      run: |
        UPDATE_LOG_URL="https://raw.githubusercontent.com/Penty-d/qq-farm-bot-ui/main/Update.log"

        # 尝试获取上次版本
        if [ -f .github/workflows/last_version.txt ]; then
          CURRENT_VERSION=$(cat .github/workflows/last_version.txt)
          echo "从文件读取到上次版本: $CURRENT_VERSION"
        else
          CURRENT_VERSION="0.0.0"
          echo "没有找到上次版本，使用默认值: $CURRENT_VERSION"
        fi

        # 获取最新版本
        LATEST_VERSION=$(curl -s "$UPDATE_LOG_URL" | \
          grep -oP "后端：v\K[0-9]+\.[0-9]+\.[0-9]+" | \
          head -1)

        if [ -z "$LATEST_VERSION" ]; then
          LATEST_VERSION=$(curl -s "$UPDATE_LOG_URL" | \
            grep -oP "v[0-9]+\.[0-9]+\.[0-9]+" | \
            head -1 | \
            sed 's/^v//')
        fi

        echo "当前版本: $CURRENT_VERSION"
        echo "最新版本: $LATEST_VERSION"

        # 只有当版本号有效且不同时才构建
        if [ -n "$LATEST_VERSION" ] && [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
          echo "✅ 版本已变化！"
          echo "has_update=true" >> $GITHUB_OUTPUT
          echo "new_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
        else
          echo "❌ 版本未变化"
          echo "has_update=false" >> $GITHUB_OUTPUT
        fi

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      if: steps.check.outputs.has_update == 'true' || github.event.inputs.force_build == 'true'
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./core/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:${{ steps.version.outputs.full_version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64
        build-args: |
          APP_VERSION=${{ steps.version.outputs.full_version }}

    - name: Save version
      if: steps.check.outputs.has_update == 'true' || github.event.inputs.force_build == 'true'
      run: |
        echo "${{ steps.check.outputs.new_version }}" > .github/workflows/last_version.txt
        git config --global user.name 'github-actions'
        git config --global user.email 'actions@github.com'
        git add .github/workflows/last_version.txt
        git commit -m "Update version to ${{ steps.check.outputs.new_version }}" || echo "No changes"
        git push origin main || echo "Push failed"

    - name: Notification
      if: steps.check.outputs.has_update == 'true' || github.event.inputs.force_build == 'true'
      run: |
        echo "✅ 构建完成！"
        echo "版本: ${{ steps.version.outputs.full_version }}"
        echo "镜像: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:latest"
