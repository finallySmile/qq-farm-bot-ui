name: Auto Build QQ Farm Bot UI - Fixed Merge

on:
  schedule:
    - cron: '0 */4 * * *'

  workflow_dispatch:
    inputs:
      force_build:
        description: '强制构建'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Configure Git
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

    - name: Add upstream remote
      run: |
        if ! git remote | grep -q upstream; then
          git remote add upstream https://github.com/Penty-d/qq-farm-bot-ui.git
        fi
        git fetch upstream --depth=1

    - name: Get version from Update.log
      id: version
      run: |
        VERSION=$(curl -s https://raw.githubusercontent.com/Penty-d/qq-farm-bot-ui/main/Update.log | \
          grep -oP "后端：v\K[0-9]+\.[0-9]+\.[0-9]+" | \
          head -1)

        if [ -z "$VERSION" ]; then
          VERSION=$(curl -s https://raw.githubusercontent.com/Penty-d/qq-farm-bot-ui/main/Update.log | \
            grep -oP "v[0-9]+\.[0-9]+\.[0-9]+" | \
            head -1 | \
            sed 's/^v//')
        fi

        if [ -z "$VERSION" ]; then
          VERSION=$(git rev-parse upstream/main | cut -c1-8)
        fi

        BUILD_TIME=$(date +%Y%m%d-%H%M%S)
        FULL_VERSION="${VERSION}-${BUILD_TIME}"

        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
        echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT

    - name: Check for updates
      id: check
      run: |
        UPSTREAM=$(git rev-parse upstream/main)
        LOCAL=$(git rev-parse main)

        if [ "$UPSTREAM" != "$LOCAL" ]; then
          echo "✅ 发现上游更新！"
          echo "has_update=true" >> $GITHUB_OUTPUT
          echo "new_commit=$UPSTREAM" >> $GITHUB_OUTPUT
        else
          echo "❌ 没有发现更新"
          echo "has_update=false" >> $GITHUB_OUTPUT
        fi

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      if: steps.check.outputs.has_update == 'true' || github.event.inputs.force_build == 'true'
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./core/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:${{ steps.version.outputs.full_version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64
        build-args: |
          APP_VERSION=${{ steps.version.outputs.full_version }}

    # 方案1：允许合并无关历史
    - name: Update local repo (Allow unrelated histories)
      if: steps.check.outputs.has_update == 'true'
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'actions@github.com'

        # 拉取最新更改
        git pull --rebase origin main || true

        # 允许合并无关历史
        git merge --no-ff --allow-unrelated-histories upstream/main -m "Auto-merge: ${{ steps.check.outputs.new_commit }}"

        # 推送
        git push origin main

    - name: Notification
      if: steps.check.outputs.has_update == 'true' || github.event.inputs.force_build == 'true'
      run: |
        echo "✅ 构建完成！"
        echo "镜像: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:latest"
        echo "版本: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:${{ steps.version.outputs.full_version }}"
