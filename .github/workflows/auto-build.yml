name: Auto Build QQ Farm Bot UI

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: '强制构建'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Debug - Check project structure
      run: |
        echo "=== 项目根目录 ==="
        pwd
        ls -la
        echo ""
        echo "===检查 core 目录 ==="
        ls -la core/
        echo ""
        echo "=== 检查 core/Dockerfile ==="
        if [ -f core/Dockerfile ]; then
          echo "✅ core/Dockerfile 存在"
          echo "文件大小: $(wc -c < core/Dockerfile) 字节"
          echo "前10行:"
          head -10 core/Dockerfile
        else
          echo "❌ core/Dockerfile 不存在"
          exit 1
        fi

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Add upstream remote
      run: |
        git remote add upstream https://github.com/Penty-d/qq-farm-bot-ui.git
        git fetch upstream --depth=1

    - name: Check for updates
      id: check
      run: |
        UPSTREAM=$(git rev-parse upstream/main)
        LOCAL=$(git rev-parse main)

        if [ "$UPSTREAM" != "$LOCAL" ]; then
          echo "has_update=true" >> $GITHUB_OUTPUT
          echo "new_commit=$UPSTREAM" >> $GITHUB_OUTPUT
        else
          echo "has_update=false" >> $GITHUB_OUTPUT
        fi

    - name: Login to Docker Hub
      if: steps.check.outputs.has_update == 'true'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push
      if: steps.check.outputs.has_update == 'true'
      uses: docker/build-push-action@v5
      with:
        context: .  # 项目根目录
        file: ./core/Dockerfile  # 指定 core 目录中的 Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:${{ steps.check.outputs.new_commit }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64
        build-args: |
          NPM_REGISTRY=https://mirrors.cloud.tencent.com/npm/

    - name: Update local repo
      if: steps.check.outputs.has_update == 'true'
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'actions@github.com'
        git merge --no-ff upstream/main -m "Auto-merge: ${{ steps.check.outputs.new_commit }}"
        git push origin main
