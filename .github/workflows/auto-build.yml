name: Auto Build QQ Farm Bot UI - Latest Code Only

on:
  schedule:
    - cron: '0 */6 * * *'

  workflow_dispatch:
    inputs:
      force_build:
        description: '强制构建'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Sync with upstream (Get latest code)
      run: |
        # 添加上游远程
        if ! git remote | grep -q upstream; then
          git remote add upstream https://github.com/Penty-d/qq-farm-bot-ui.git
        fi

        # 获取上游最新
        git fetch upstream main

        # 重置到上游（确保使用最新代码）
        git reset --hard upstream/main

    - name: Get version from Update.log
      id: version
      run: |
        VERSION=$(curl -s https://raw.githubusercontent.com/Penty-d/qq-farm-bot-ui/main/Update.log | \
          grep -oP "后端：v\K[0-9]+\.[0-9]+\.[0-9]+" | \
          head -1)

        if [ -z "$VERSION" ]; then
          VERSION=$(curl -s https://raw.githubusercontent.com/Penty-d/qq-farm-bot-ui/main/Update.log | \
            grep -oP "v[0-9]+\.[0-9]+\.[0-9]+" | \
            head -1 | \
            sed 's/^v//')
        fi

        if [ -z "$VERSION" ]; then
          VERSION=$(git rev-parse HEAD | cut -c1-8)
        fi

        BUILD_TIME=$(date +%Y%m%d-%H%M%S)
        FULL_VERSION="${VERSION}-${BUILD_TIME}"

        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
        echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT

    - name: Check for updates
      id: check
      run: |
        UPDATE_LOG_URL="https://raw.githubusercontent.com/Penty-d/qq-farm-bot-ui/main/Update.log"
        CURRENT_VERSION=$(cat .github/workflows/current_version.txt 2>/dev/null || echo "")
        LATEST_VERSION=$(curl -s "$UPDATE_LOG_URL" | grep -oP "后端：v\K[0-9]+\.[0-9]+\.[0-9]+" | head -1)

        if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
          echo "✅ 发现版本更新！"
          echo "has_update=true" >> $GITHUB_OUTPUT
          echo "new_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "$LATEST_VERSION" > .github/workflows/current_version.txt
        else
          echo "❌ 没有发现版本更新"
          echo "has_update=false" >> $GITHUB_OUTPUT
        fi

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      if: steps.check.outputs.has_update == 'true' || github.event.inputs.force_build == 'true'
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./core/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:${{ steps.version.outputs.full_version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64
        build-args: |
          APP_VERSION=${{ steps.version.outputs.full_version }}

    - name: Notification
      if: steps.check.outputs.has_update == 'true' || github.event.inputs.force_build == 'true'
      run: |
        echo "✅ 构建完成！"
        echo "镜像: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:latest"
        echo "版本: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:${{ steps.version.outputs.full_version }}"
