name: Auto Build QQ Farm Bot UI - Simplified with Latest

on:
  schedule:
    - cron: '0 */4 * * *'

  workflow_dispatch:
    inputs:
      force_build:
        description: '强制构建'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Configure Git
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

    - name: Add upstream remote
      run: |
        git remote remove upstream || true
        git remote add upstream https://github.com/Penty-d/qq-farm-bot-ui.git
        git fetch upstream --depth=1

    - name: Get version from Update.log
      id: version
      run: |
        UPDATE_LOG_URL="https://raw.githubusercontent.com/Penty-d/qq-farm-bot-ui/main/Update.log"

        if curl -s --head "$UPDATE_LOG_URL" | grep -q "200 OK"; then
          UPDATE_LOG_CONTENT=$(curl -s "$UPDATE_LOG_URL")

          # 提取后端版本（优先）
          BACKEND_VERSION=$(echo "$UPDATE_LOG_CONTENT" | grep -oP "后端：v\K[0-9]+\.[0-9]+\.[0-9]+" | head -1)
          FRONTEND_VERSION=$(echo "$UPDATE_LOG_CONTENT" | grep -oP "前端：v\K[0-9]+\.[0-9]+\.[0-9]+" | head -1)

          if [ -n "$BACKEND_VERSION" ]; then
            VERSION="$BACKEND_VERSION"
          elif [ -n "$FRONTEND_VERSION" ]; then
            VERSION="$FRONTEND_VERSION"
          else
            VERSION=$(git rev-parse upstream/main | cut -c1-8)
          fi
        else
          VERSION=$(git rev-parse upstream/main | cut -c1-8)
        fi

        # 生成带日期的版本号
        BUILD_TIME=$(date +%Y%m%d-%H%M%S)
        FULL_VERSION="${VERSION}-${BUILD_TIME}"

        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
        echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT

    - name: Check for updates
      id: check
      run: |
        UPSTREAM=$(git rev-parse upstream/main)
        LOCAL=$(git rev-parse main)

        if [ "$UPSTREAM" != "$LOCAL" ]; then
          echo "has_update=true" >> $GITHUB_OUTPUT
        else
          echo "has_update=false" >> $GITHUB_OUTPUT
        fi

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      if: steps.check.outputs.has_update == 'true' || github.event.inputs.force_build == 'true'
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./core/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:${{ steps.version.outputs.full_version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64
        build-args: |
          APP_VERSION=${{ steps.version.outputs.full_version }}

    - name: Update local repo
      if: steps.check.outputs.has_update == 'true'
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'actions@github.com'
        git merge --no-ff upstream/main -m "Auto-merge: ${{ steps.check.outputs.new_commit }}"
        git push origin main

    - name: Notification
      if: steps.check.outputs.has_update == 'true' || github.event.inputs.force_build == 'true'
      run: |
        echo "✅ 构建完成！"
        echo "镜像: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:latest"
        echo "版本: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:${{ steps.version.outputs.full_version }}"
