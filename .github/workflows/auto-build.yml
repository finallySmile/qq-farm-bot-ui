name: Auto Build QQ Farm Bot UI - Debug Version Fix

on:
  schedule:
    - cron: '0 */4 * * *'

  workflow_dispatch:
    inputs:
      force_build:
        description: '强制构建'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Configure Git
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

    - name: Add upstream remote
      run: |
        git remote remove upstream || true
        git remote add upstream https://github.com/Penty-d/qq-farm-bot-ui.git
        git fetch upstream --depth=1

    - name: Get version from Update.log (Debug & Fix)
      id: version
      run: |
        echo "=== 从 Update.log 读取版本号 ==="

        UPDATE_LOG_URL="https://raw.githubusercontent.com/Penty-d/qq-farm-bot-ui/main/Update.log"

        # 检查文件是否存在
        if curl -s --head "$UPDATE_LOG_URL" | grep -q "200 OK"; then
          echo "✅ Update.log 文件存在"

          # 获取文件内容
          CONTENT=$(curl -s "$UPDATE_LOG_URL")

          # 显示前5行，便于调试
          echo ""
          echo "Update.log 前5行内容:"
          echo "$CONTENT" | head -5

          # 提取版本号 - 多种方法尝试
          echo ""
          echo "尝试提取版本号..."

          # 方法1: 提取 v2.0.3 格式
          VERSION_V=$(echo "$CONTENT" | grep -oP "v[0-9]+\.[0-9]+\.[0-9]+" | head -1 | sed 's/^v//')
          echo "方法1 (vX.Y.Z): $VERSION_V"

          # 方法2: 提取 X.Y.Z 格式
          VERSION_RAW=$(echo "$CONTENT" | grep -oP "[0-9]+\.[0-9]+\.[0-9]+" | head -1)
          echo "方法2 (X.Y.Z): $VERSION_RAW"

          # 方法3: 提取特定格式（针对您的Update.log）
          # 格式：2026-03-02 一次更新 前端：v2.0.3 后端：v2.0.3
          VERSION_SPECIFIC=$(echo "$CONTENT" | grep -oP "后端：v\K[0-9]+\.[0-9]+\.[0-9]+" | head -1)
          echo "方法3 (后端版本): $VERSION_SPECIFIC"

          # 选择版本号
          if [ -n "$VERSION_SPECIFIC" ]; then
            VERSION="$VERSION_SPECIFIC"
            echo "✅ 使用后端版本: $VERSION"
          elif [ -n "$VERSION_V" ]; then
            VERSION="$VERSION_V"
            echo "✅ 使用v格式版本: $VERSION"
          elif [ -n "$VERSION_RAW" ]; then
            VERSION="$VERSION_RAW"
            echo "✅ 使用原始版本: $VERSION"
          else
            VERSION=$(git rev-parse upstream/main | cut -c1-8)
            echo "❌ 未找到版本号，使用 Git 哈希: $VERSION"
          fi
        else
          echo "❌ 无法访问 Update.log"
          VERSION=$(git rev-parse upstream/main | cut -c1-8)
          echo "使用 Git 哈希: $VERSION"
        fi

        # 生成完整版本号
        BUILD_TIME=$(date +%Y%m%d-%H%M%S)
        FULL_VERSION="${VERSION}-${BUILD_TIME}"

        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
        echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT

        echo ""
        echo "=== 最终结果 ==="
        echo "基础版本: $VERSION"
        echo "完整版本: $FULL_VERSION"

    - name: Check for updates
      id: check
      run: |
        UPSTREAM=$(git rev-parse upstream/main)
        LOCAL=$(git rev-parse main)

        if [ "$UPSTREAM" != "$LOCAL" ]; then
          echo "has_update=true" >> $GITHUB_OUTPUT
        else
          echo "has_update=false" >> $GITHUB_OUTPUT
        fi

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      if: steps.check.outputs.has_update == 'true' || github.event.inputs.force_build == 'true'
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./core/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:${{ steps.version.outputs.full_version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64
        build-args: |
          APP_VERSION=${{ steps.version.outputs.full_version }}

    - name: Update local repo
      if: steps.check.outputs.has_update == 'true'
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'actions@github.com'
        git merge --no-ff upstream/main -m "Auto-merge: ${{ steps.check.outputs.new_commit }}"
        git push origin main

    - name: Notification
      if: steps.check.outputs.has_update == 'true' || github.event.inputs.force_build == 'true'
      run: |
        echo "✅ 构建完成！"
        echo "镜像: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:latest"
        echo "版本: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:${{ steps.version.outputs.full_version }}"
