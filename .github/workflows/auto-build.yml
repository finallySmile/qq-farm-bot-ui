name: Build Only When Version Changes (Simple)

on:
  schedule:
    - cron: '0 */6 * * *'

  workflow_dispatch:
    inputs:
      force_build:
        description: '强制构建'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}
      current_version: ${{ steps.current.outputs.current_version }}

    steps:
    - name: Get current version
      id: current
      run: |
        UPDATE_LOG_URL="https://raw.githubusercontent.com/smdk000/qq-farm-bot-ui/main/Update.log"

        if curl -s --head "$UPDATE_LOG_URL" | grep -q "200 OK"; then
          CURRENT_VERSION=$(curl -s "$UPDATE_LOG_URL" | \
            grep -oP "后端：v\K[0-9]+\.[0-9]+\.[0-9]+" | \
            head -1)

          if [ -z "$CURRENT_VERSION" ]; then
            CURRENT_VERSION=$(curl -s "$UPDATE_LOG_URL" | \
              grep -oP "v[0-9]+\.[0-9]+\.[0-9]+" | \
              head -1 | \
              sed 's/^v//')
          fi

          if [ -z "$CURRENT_VERSION" ]; then
            CURRENT_VERSION=$(curl -s "$UPDATE_LOG_URL" | \
              grep -oP "[0-9]+\.[0-9]+\.[0-9]+" | \
              head -1)
          fi
        else
          CURRENT_VERSION="unknown"
        fi

        echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

    - name: Get previous version
      id: previous
      run: |
        # 使用 GitHub 缓存获取上次版本
        if [ -f .github/workflows/last_version.txt ]; then
          PREVIOUS_VERSION=$(cat .github/workflows/last_version.txt)
        else
          PREVIOUS_VERSION="0.0.0"
        fi

        echo "previous_version=$PREVIOUS_VERSION" >> $GITHUB_OUTPUT

    - name: Check if version changed
      id: check
      run: |
        CURRENT="${{ steps.current.outputs.current_version }}"
        PREVIOUS="${{ steps.previous.outputs.previous_version }}"

        echo "当前版本: $CURRENT"
        echo "上次版本: $PREVIOUS"

        if [ "$CURRENT" != "$PREVIOUS" ]; then
          echo "version_changed=true" >> $GITHUB_OUTPUT
        else
          echo "version_changed=false" >> $GITHUB_OUTPUT        fi

  build:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true' || github.event.inputs.force_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Sync with upstream
      run: |
        git remote add upstream https://github.com/smdk000/qq-farm-bot-ui.git || true
        git fetch upstream main
        git reset --hard upstream/main

    - name: Get version
      id: version
      run: |
        VERSION="${{ needs.check-version.outputs.current_version }}"
        BUILD_TIME=$(date +%Y%m%d-%H%M%S)
        FULL_VERSION="${VERSION}-${BUILD_TIME}"

        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/qq-farm-bot-ui:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/qq-farm-bot-ui:${{ steps.version.outputs.full_version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64

    - name: Save version
      run: |
        echo "${{ needs.check-version.outputs.current_version }}" > .github/workflows/last_version.txt
        git config --global user.name 'github-actions'
        git config --global user.email 'actions@github.com'
        git add .github/workflows/last_version.txt
        git commit -m "Update version to ${{ needs.check-version.outputs.current_version }}" || echo "No changes"
        git push origin main || echo "Push failed"

    - name: Notification
      run: |
        echo "✅ 版本更新构建完成！"
        echo "版本: ${{ steps.version.outputs.full_version }}"
