name: 自动构建QQ农场机器人UI - 优化版（小v版本号，始终覆盖更新）

on:
  schedule:
    - cron: '0 */12 * * *'

  workflow_dispatch:
    inputs:
      build_type:
        description: '选择构建类型'
        required: true
        default: 'normal'
        type: choice
        options:
          - 'normal'        # 常规构建：检查代码变更
          - 'emergency'     # 紧急构建：跳过所有检查，强制构建

  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    # 环境变量
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: 检出代码（优化版）
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: 设置Docker构建环境
      uses: docker/setup-buildx-action@v3

    - name: 同步上游代码（优化版）
      run: |
        if ! git remote | grep -q upstream; then
          git remote add upstream https://github.com/Penty-d/qq-farm-bot-ui.git
        fi

        git fetch upstream main --depth=10
        git reset --hard upstream/main

    - name: 检查代码变更（任意目录）
      id: check
      env:
        BUILD_TYPE: ${{ github.event.inputs.build_type }}
      run: |
        echo "开始检查代码变更..."

        if [ "$BUILD_TYPE" = "emergency" ]; then
          echo "🚨 紧急构建模式"
          echo "has_update=true" >> $GITHUB_OUTPUT
          echo "reason=emergency_build" >> $GITHUB_OUTPUT
          exit 0
        fi

        CURRENT_COMMIT=$(git rev-parse HEAD)
        git fetch origin main --depth=10
        ORIGIN_COMMIT=$(git rev-parse origin/main)

        if [ "$CURRENT_COMMIT" = "$ORIGIN_COMMIT" ]; then
          echo "❌ 代码没有变更"
          echo "has_update=false" >> $GITHUB_OUTPUT
          echo "reason=no_change" >> $GITHUB_OUTPUT
        else
          git fetch upstream main --depth=10
          git diff --name-only origin/main..upstream/main > /tmp/all_changes.txt

          if [ -s /tmp/all_changes.txt ]; then
            echo "✅ 检测到代码变更"
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "reason=code_change" >> $GITHUB_OUTPUT
          else
            echo "⚠️  代码没有变更"
            echo "has_update=false" >> $GITHUB_OUTPUT
            echo "reason=no_change" >> $GITHUB_OUTPUT
          fi
        fi

    - name: 获取版本号并登录Docker Hub（合并版）
      if: steps.check.outputs.has_update == 'true'
      id: version
      env:
        BUILD_TYPE: ${{ github.event.inputs.build_type }}
        DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      run: |
        # 获取基础版本号（从Update.log）
        UPDATE_LOG_URL="https://raw.githubusercontent.com/Penty-d/qq-farm-bot-ui/main/Update.log"
        BASE_VERSION=$(curl -s "$UPDATE_LOG_URL" | grep -oP "后端：v\K[0-9]+\.[0-9]+\.[0-9]+" | head -1)

        if [ -z "$BASE_VERSION" ]; then
          echo "❌ 无法获取版本号"
          exit 1
        fi

        # 添加小写v前缀
        FINAL_VERSION="v${BASE_VERSION}"

        echo "基础版本号: $BASE_VERSION"
        echo "最终版本号: $FINAL_VERSION"

        echo "version=$FINAL_VERSION" >> $GITHUB_OUTPUT
        echo "base_version=$BASE_VERSION" >> $GITHUB_OUTPUT

        # 登录Docker Hub
        echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin

        if [ $? -eq 0 ]; then
          echo "✅ Docker Hub登录成功"
        else
          echo "❌ Docker Hub登录失败"
          exit 1
        fi

    - name: 构建并推送Docker镜像（始终覆盖更新）
      if: steps.check.outputs.has_update == 'true'
      env:
        DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_REPO }}
        VERSION: ${{ steps.version.outputs.version }}
        BASE_VERSION: ${{ steps.version.outputs.base_version }}
      run: |
        echo "构建并推送Docker镜像..."
        echo "版本号: $VERSION"
        echo "基础版本号: $BASE_VERSION"

        # 清理旧镜像
        docker rmi -f ${DOCKERHUB_USERNAME}/${DOCKERHUB_REPO}:latest 2>/dev/null || true
        docker rmi -f ${DOCKERHUB_USERNAME}/${DOCKERHUB_REPO}:${VERSION} 2>/dev/null || true

        # 构建镜像
        docker build \
          --platform linux/amd64 \
          --build-arg APP_VERSION=${BASE_VERSION} \
          -t ${DOCKERHUB_USERNAME}/${DOCKERHUB_REPO}:latest \
          -t ${DOCKERHUB_USERNAME}/${DOCKERHUB_REPO}:${VERSION} \
          -f ./core/Dockerfile .

        if [ $? -ne 0 ]; then
          echo "❌ Docker构建失败"
          exit 1
        fi

        echo "✅ 构建成功，镜像大小:"
        docker images | grep ${DOCKERHUB_USERNAME}/${DOCKERHUB_REPO}

        # 推送镜像（直接推送，覆盖原有标签）
        echo "推送镜像..."
        docker push ${DOCKERHUB_USERNAME}/${DOCKERHUB_REPO}:${VERSION}
        docker push ${DOCKERHUB_USERNAME}/${DOCKERHUB_REPO}:latest

        if [ $? -ne 0 ]; then
          echo "❌ 镜像推送失败"
          exit 1
        fi

        echo "✅ 镜像推送完成"

        # 验证镜像
        echo "验证镜像..."
        sleep 10

        LATEST_DIGEST=$(curl -s "https://hub.docker.com/v2/repositories/${DOCKERHUB_USERNAME}/${DOCKERHUB_REPO}/tags/latest" | jq -r '.digest')
        VERSION_DIGEST=$(curl -s "https://hub.docker.com/v2/repositories/${DOCKERHUB_USERNAME}/${DOCKERHUB_REPO}/tags/${VERSION}" | jq -r '.digest')

        if [ "$LATEST_DIGEST" = "$VERSION_DIGEST" ]; then
          echo "✅ 验证成功，latest标签已更新"
        else
          echo "⚠️ 验证失败，latest标签可能未更新"
        fi

    - name: 创建Git标签（小v版本号）
      if: steps.check.outputs.has_update == 'true'
      run: |
        VERSION_TO_TAG="${{ steps.version.outputs.version }}"
        TAG_NAME="${VERSION_TO_TAG}"  # 直接使用版本号作为标签名（小v）

        git config --global user.name 'github-actions'
        git config --global user.email 'actions@github.com'

        # 检查标签是否存在，存在则删除后重新创建
        if git ls-remote --tags origin | grep -q "refs/tags/${TAG_NAME}$"; then
          echo "标签已存在，删除旧标签..."
          git tag -d "${TAG_NAME}" || true
          git push origin --delete "${TAG_NAME}" || true
        fi

        echo "创建Git标签: $TAG_NAME"
        git tag "$TAG_NAME"
        git push origin "$TAG_NAME"

        echo "✅ Git标签创建完成: $TAG_NAME"

    - name: 构建完成通知
      if: steps.check.outputs.has_update == 'true'
      run: |
        echo "========================================"
        echo "✅ 构建完成！"
        echo "========================================"
        echo "版本: ${{ steps.version.outputs.version }}"
        echo "镜像: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:${{ steps.version.outputs.version }}"
        echo "最新镜像: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:latest"
        echo ""
        echo "💡 版本号格式: 小写v开头（例如：v2.0.10）"
        echo "💡 更新策略: 始终覆盖更新，不保留旧版本"
        echo "💡 取消fixed后缀"
        echo ""
        echo "💡 使用说明:"
        echo "1. 最新镜像: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:latest"
        echo "2. 特定版本: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:${{ steps.version.outputs.version }}"
