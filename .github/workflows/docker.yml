name: Auto Build QQ Farm Bot UI - Backend Only (Update.log Required)

on:
  schedule:
    - cron: '0 */6 * * *'

  workflow_dispatch:
    inputs:
      force_build:
        description: '强制构建'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Sync with upstream (Get latest code)
      run: |
        if ! git remote | grep -q upstream; then
          git remote add upstream https://github.com/Penty-d/qq-farm-bot-ui.git
        fi
        git fetch upstream main
        git reset --hard upstream/main

    - name: Check for backend updates only
      id: check
      run: |
        # 获取当前提交哈希（同步上游后的）
        CURRENT_COMMIT=$(git rev-parse HEAD)
        echo "当前提交: $CURRENT_COMMIT"

        # 获取远程分支的最新提交
        git fetch origin main
        ORIGIN_COMMIT=$(git rev-parse origin/main)
        echo "远程提交: $ORIGIN_COMMIT"

        # 比较两个提交是否相同
        if [ "$CURRENT_COMMIT" = "$ORIGIN_COMMIT" ]; then
          echo "❌ 代码没有变更，跳过构建"
          echo "has_update=false" >> $GITHUB_OUTPUT
        else
          # 检查是否有后端目录的变更
          git fetch upstream main
          echo "检查后端目录 (core/) 的变更..."

          # 获取当前提交和远程提交之间的差异
          git diff --name-only origin/main..upstream/main -- core/ > /tmp/backend_changes.txt

          if [ -s /tmp/backend_changes.txt ]; then
            echo "✅ 检测到后端代码变更，开始构建"
            echo "变更的文件:"
            cat /tmp/backend_changes.txt
            echo "has_update=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️  只有前端或其他目录变更，跳过后端构建"
            echo "has_update=false" >> $GITHUB_OUTPUT
          fi
        fi

    - name: Get version from Update.log (Backend only)
      if: steps.check.outputs.has_update == 'true' || github.event.inputs.force_build == 'true'
      id: version
      run: |
        UPDATE_LOG_URL="https://raw.githubusercontent.com/Penty-d/qq-farm-bot-ui/main/Update.log"

        echo "尝试从Update.log获取后端版本号..."
        echo "URL: $UPDATE_LOG_URL"

        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$UPDATE_LOG_URL")

        if [ "$HTTP_CODE" = "200" ]; then
          echo "✅ Update.log文件存在 (HTTP $HTTP_CODE)"

          # 只获取后端版本号
          VERSION=$(curl -s "$UPDATE_LOG_URL" | \
            grep -oP "后端：v\K[0-9]+\.[0-9]+\.[0-9]+" | \
            head -1)

          if [ -z "$VERSION" ]; then
            echo "❌ 无法从Update.log提取后端版本号"
            echo "Update.log内容:"
            curl -s "$UPDATE_LOG_URL" | head -10
            exit 1
          fi

          echo "✅ 从Update.log获取后端版本: $VERSION"
        else
          echo "❌ Update.log文件不存在或无法访问 (HTTP $HTTP_CODE)"
          echo "跳过构建，不更新Docker镜像"
          exit 1
        fi

        BUILD_TIME=$(date +%Y%m%d-%H%M%S)
        FULL_VERSION="${VERSION}-${BUILD_TIME}"

        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
        echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT

    - name: Login to Docker Hub
      if: steps.check.outputs.has_update == 'true' || github.event.inputs.force_build == 'true'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image (Backend only)
      if: steps.check.outputs.has_update == 'true' || github.event.inputs.force_build == 'true'
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./core/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:${{ steps.version.outputs.full_version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64
        build-args: |
          APP_VERSION=${{ steps.version.outputs.full_version }}

    - name: Create Git Tag (Skip if exists)
      if: steps.check.outputs.has_update == 'true' || github.event.inputs.force_build == 'true'
      run: |
        # 确定版本号
        VERSION_TO_TAG="${{ steps.version.outputs.version }}"

        # 配置Git
        git config --global user.name 'github-actions'
        git config --global user.email 'actions@github.com'

        # 创建标签（格式：v版本号）
        TAG_NAME="v${VERSION_TO_TAG}"
        echo "检查标签是否存在: $TAG_NAME"

        # 检查远程仓库是否已存在该标签
        if git ls-remote --tags origin | grep -q "refs/tags/${TAG_NAME}$"; then
          echo "⚠️  远程标签 $TAG_NAME 已存在，跳过创建。"
          echo "版本: $VERSION_TO_TAG"
          echo "镜像: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:latest"
        else
          echo "创建Git标签: $TAG_NAME"
          # 创建并推送标签
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
          echo "✅ Git标签已创建并推送: $TAG_NAME"
          echo "版本: $VERSION_TO_TAG"
          echo "镜像: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:latest"
        fi

    - name: Notification
      if: steps.check.outputs.has_update == 'true' || github.event.inputs.force_build == 'true'
      run: |
        echo "✅ 后端构建完成！"
        echo "版本: ${{ steps.version.outputs.full_version }}"
        echo "镜像: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:latest"
