name: Auto Build QQ Farm Bot UI - Backend Only (Optimized for Storage)

on:
  schedule:
    - cron: '0 */12 * * *'

  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'normal'
        type: choice
        options:
          - 'normal'
          - 'emergency'
          - 'force'

  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        # 使用默认构建器，避免创建额外的构建器实例
        driver-opts: |
          network=host

    - name: Sync with upstream (Get latest code)
      run: |
        if ! git remote | grep -q upstream; then
          git remote add upstream https://github.com/Penty-d/qq-farm-bot-ui.git
        fi
        git fetch upstream main
        git reset --hard upstream/main

    - name: Check for backend updates only
      id: check
      env:
        BUILD_TYPE: ${{ github.event.inputs.build_type }}
      run: |
        if [ "$BUILD_TYPE" = "emergency" ]; then
          echo "🚨 紧急构建模式：跳过所有检查，直接构建"
          echo "has_update=true" >> $GITHUB_OUTPUT
          echo "reason=emergency_build" >> $GITHUB_OUTPUT
          exit 0
        fi

        CURRENT_COMMIT=$(git rev-parse HEAD)
        echo "当前提交: $CURRENT_COMMIT"

        git fetch origin main
        ORIGIN_COMMIT=$(git rev-parse origin/main)
        echo "远程提交: $ORIGIN_COMMIT"

        if [ "$CURRENT_COMMIT" = "$ORIGIN_COMMIT" ]; then
          echo "❌ 代码没有变更，跳过构建"
          echo "has_update=false" >> $GITHUB_OUTPUT
          echo "reason=no_change" >> $GITHUB_OUTPUT
        else
          git fetch upstream main
          echo "检查后端目录 (core/) 的变更..."

          git diff --name-only origin/main..upstream/main -- core/ > /tmp/backend_changes.txt

          if [ -s /tmp/backend_changes.txt ]; then
            echo "✅ 检测到后端代码变更，开始构建"
            echo "变更的文件:"
            cat /tmp/backend_changes.txt
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "reason=backend_change" >> $GITHUB_OUTPUT
          else
            echo "⚠️  只有前端或其他目录变更，跳过后端构建"
            echo "has_update=false" >> $GITHUB_OUTPUT
            echo "reason=frontend_only" >> $GITHUB_OUTPUT
          fi
        fi

    - name: Get version from Update.log (Smart Versioning)
      if: steps.check.outputs.has_update == 'true'
      id: version
      env:
        BUILD_TYPE: ${{ github.event.inputs.build_type }}
      run: |
        UPDATE_LOG_URL="https://raw.githubusercontent.com/Penty-d/qq-farm-bot-ui/main/Update.log"

        echo "尝试从Update.log获取后端版本号..."
        echo "URL: $UPDATE_LOG_URL"

        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$UPDATE_LOG_URL")

        if [ "$HTTP_CODE" = "200" ]; then
          echo "✅ Update.log文件存在 (HTTP $HTTP_CODE)"

          BASE_VERSION=$(curl -s "$UPDATE_LOG_URL" | \
            grep -oP "后端：v\K[0-9]+\.[0-9]+\.[0-9]+" | \
            head -1)

          if [ -z "$BASE_VERSION" ]; then
            echo "❌ 无法从Update.log提取后端版本号"
            echo "Update.log内容:"
            curl -s "$UPDATE_LOG_URL" | head -10
            exit 1
          fi

          echo "✅ 从Update.log获取基础版本: $BASE_VERSION"
        else
          echo "❌ Update.log文件不存在或无法访问 (HTTP $HTTP_CODE)"
          echo "跳过构建，不更新Docker镜像"
          exit 1
        fi

        if [ "$BUILD_TYPE" = "emergency" ] || [ "$BUILD_TYPE" = "force" ]; then
          FINAL_VERSION="$BASE_VERSION"
          echo "紧急/强制构建模式：使用基础版本 $FINAL_VERSION"
        else
          git fetch --tags
          if git tag | grep -q "^v${BASE_VERSION}$"; then
            FINAL_VERSION="${BASE_VERSION}-fixed"
            echo "版本号 $BASE_VERSION 已存在，使用-fixed版本: $FINAL_VERSION"
          else
            FINAL_VERSION="$BASE_VERSION"
            echo "版本号 $BASE_VERSION 不存在，使用基础版本: $FINAL_VERSION"
          fi
        fi

        echo "version=$FINAL_VERSION" >> $GITHUB_OUTPUT
        echo "base_version=$BASE_VERSION" >> $GITHUB_OUTPUT

        mkdir -p .github/workflows
        echo "$BASE_VERSION" > .github/workflows/last_version.txt

    - name: Login to Docker Hub
      if: steps.check.outputs.has_update == 'true'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image (Backend only)
      if: steps.check.outputs.has_update == 'true'
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./core/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:${{ steps.version.outputs.version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64
        build-args: |
          APP_VERSION=${{ steps.version.outputs.version }}
        # 关键优化：确保只推送最终镜像，不保留中间镜像
        # 使用--rm选项，构建后删除中间容器
        # 注意：build-push-action默认会清理，但我们可以确保

    - name: Create Git Tag (Only for new versions)
      if: steps.check.outputs.has_update == 'true' && !contains(steps.version.outputs.version, '-fixed')
      run: |
        VERSION_TO_TAG="${{ steps.version.outputs.version }}"

        git config --global user.name 'github-actions'
        git config --global user.email 'actions@github.com'

        TAG_NAME="v${VERSION_TO_TAG}"

        if git ls-remote --tags origin | grep -q "refs/tags/${TAG_NAME}$"; then
          echo "⚠️  远程标签 $TAG_NAME 已存在，跳过创建。"
        else
          echo "创建Git标签: $TAG_NAME"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
          echo "✅ Git标签已创建并推送: $TAG_NAME"
        fi

        echo "版本: $VERSION_TO_TAG"
        echo "镜像: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:$VERSION_TO_TAG"

    - name: Cleanup old Docker images
      if: steps.check.outputs.has_update == 'true'
      env:
        DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_REPO }}
      run: |
        echo "开始清理旧的Docker镜像..."

        # 获取所有镜像标签（排除latest和当前版本）
        ALL_TAGS=$(curl -s -u "$DOCKERHUB_USERNAME:$DOCKERHUB_TOKEN" \
          "https://hub.docker.com/v2/repositories/$DOCKERHUB_USERNAME/$DOCKERHUB_REPO/tags?page_size=100" | \
          jq -r '.results[].name')

        # 过滤出版本号标签（格式：X.X.X 或 X.X.X-fixed）
        # 排除不规范的标签（如带时间戳的）
        VERSION_TAGS=$(echo "$ALL_TAGS" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+(-fixed)?$')

        # 排序并保留最近10个版本（按版本号降序）
        KEEP_COUNT=10
        TAGS_TO_KEEP=$(echo "$VERSION_TAGS" | sort -V -r | head -n $KEEP_COUNT)
        TAGS_TO_DELETE=$(echo "$VERSION_TAGS" | sort -V -r | tail -n +$((KEEP_COUNT + 1)))

        echo "保留最近 $KEEP_COUNT 个版本:"
        echo "$TAGS_TO_KEEP"
        echo ""
        echo "要删除的旧版本:"
        echo "$TAGS_TO_DELETE"

        if [ -n "$TAGS_TO_DELETE" ]; then
          for TAG in $TAGS_TO_DELETE; do
            echo "删除旧镜像: $TAG"
            curl -s -u "$DOCKERHUB_USERNAME:$DOCKERHUB_TOKEN" \
              -X DELETE \
              "https://hub.docker.com/v2/repositories/$DOCKERHUB_USERNAME/$DOCKERHUB_REPO/tags/$TAG"
          done
          echo "✅ 旧镜像清理完成"
        else
          echo "✅ 没有需要清理的旧镜像"
        fi

    - name: Notification
      if: steps.check.outputs.has_update == 'true'
      run: |
        BUILD_TYPE="${{ github.event.inputs.build_type }}"
        if [ -z "$BUILD_TYPE" ]; then
          BUILD_TYPE="scheduled"
        fi

        echo "✅ 构建完成！"
        echo "构建类型: $BUILD_TYPE"
        echo "触发原因: ${{ steps.check.outputs.reason }}"
        echo "版本: ${{ steps.version.outputs.version }}"
        echo "镜像: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:${{ steps.version.outputs.version }}"
        echo "最新镜像: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:latest"

        if [ "$BUILD_TYPE" = "emergency" ]; then
          echo "🚨 紧急构建完成，镜像已更新！"
        fi
