name: 自动构建QQ农场机器人UI - 后端优化版（解决镜像重复问题）

on:
  schedule:
    - cron: '0 */12 * * *'

  workflow_dispatch:
    inputs:
      build_type:
        description: '选择构建类型'
        required: true
        default: 'normal'
        type: choice
        options:
          - 'normal'        # 常规构建：检查代码变更
          - 'emergency'     # 紧急构建：跳过所有检查，强制构建

  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # 环境变量：启用 Node.js 24 运行
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 设置Docker构建环境
      uses: docker/setup-buildx-action@v3

    - name: 同步上游代码（获取最新代码）
      run: |
        if ! git remote | grep -q upstream; then
          git remote add upstream https://github.com/Penty-d/qq-farm-bot-ui.git
        fi
        git fetch upstream main
        git reset --hard upstream/main

    - name: 检查代码变更（任意目录）
      id: check
      env:
        BUILD_TYPE: ${{ github.event.inputs.build_type }}
      run: |
        if [ "$BUILD_TYPE" = "emergency" ]; then
          echo "🚨 紧急构建模式：跳过所有检查，直接构建"
          echo "has_update=true" >> $GITHUB_OUTPUT
          echo "reason=emergency_build" >> $GITHUB_OUTPUT
          exit 0
        fi

        CURRENT_COMMIT=$(git rev-parse HEAD)
        echo "当前提交: $CURRENT_COMMIT"

        git fetch origin main
        ORIGIN_COMMIT=$(git rev-parse origin/main)
        echo "远程提交: $ORIGIN_COMMIT"

        if [ "$CURRENT_COMMIT" = "$ORIGIN_COMMIT" ]; then
          echo "❌ 代码没有变更，跳过构建"
          echo "has_update=false" >> $GITHUB_OUTPUT
          echo "reason=no_change" >> $GITHUB_OUTPUT
        else
          git fetch upstream main
          echo "检查代码变更..."

          git diff --name-only origin/main..upstream/main > /tmp/all_changes.txt

          if [ -s /tmp/all_changes.txt ]; then
            echo "✅ 检测到代码变更，开始构建"
            echo "变更的文件:"
            cat /tmp/all_changes.txt
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "reason=code_change" >> $GITHUB_OUTPUT
          else
            echo "⚠️  代码没有变更，跳过构建"
            echo "has_update=false" >> $GITHUB_OUTPUT
            echo "reason=no_change" >> $GITHUB_OUTPUT
          fi
        fi

    - name: 从Update.log获取版本号（智能版本管理）
      if: steps.check.outputs.has_update == 'true'
      id: version
      env:
        BUILD_TYPE: ${{ github.event.inputs.build_type }}
      run: |
        UPDATE_LOG_URL="https://raw.githubusercontent.com/Penty-d/qq-farm-bot-ui/main/Update.log"

        echo "尝试从Update.log获取后端版本号..."
        echo "URL: $UPDATE_LOG_URL"

        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$UPDATE_LOG_URL")

        if [ "$HTTP_CODE" = "200" ]; then
          echo "✅ Update.log文件存在 (HTTP $HTTP_CODE)"

          BASE_VERSION=$(curl -s "$UPDATE_LOG_URL" | \
            grep -oP "后端：v\K[0-9]+\.[0-9]+\.[0-9]+" | \
            head -1)

          if [ -z "$BASE_VERSION" ]; then
            echo "❌ 无法从Update.log提取后端版本号"
            echo "Update.log内容:"
            curl -s "$UPDATE_LOG_URL" | head -10
            exit 1
          fi

          echo "✅ 从Update.log获取基础版本: $BASE_VERSION"
        else
          echo "❌ Update.log文件不存在或无法访问 (HTTP $HTTP_CODE)"
          echo "跳过构建，不更新Docker镜像"
          exit 1
        fi

        if [ "$BUILD_TYPE" = "emergency" ]; then
          FINAL_VERSION="$BASE_VERSION"
          echo "紧急构建模式：使用基础版本 $FINAL_VERSION"
        else
          git fetch --tags
          if git tag | grep -q "^v${BASE_VERSION}$"; then
            FINAL_VERSION="${BASE_VERSION}-fixed"
            echo "版本号 $BASE_VERSION 已存在，使用-fixed版本: $FINAL_VERSION"
          else
            FINAL_VERSION="$BASE_VERSION"
            echo "版本号 $BASE_VERSION 不存在，使用基础版本: $FINAL_VERSION"
          fi
        fi

        echo "version=$FINAL_VERSION" >> $GITHUB_OUTPUT
        echo "base_version=$BASE_VERSION" >> $GITHUB_OUTPUT

        mkdir -p .github/workflows
        echo "$BASE_VERSION" > .github/workflows/last_version.txt

    - name: 登录Docker Hub
      if: steps.check.outputs.has_update == 'true'
      run: |
        echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
        if [ $? -eq 0 ]; then
          echo "✅ Docker Hub登录成功"
        else
          echo "❌ Docker Hub登录失败"
          exit 1
        fi

    - name: 构建Docker镜像（确保可重复性）
      if: steps.check.outputs.has_update == 'true'
      env:
        DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_REPO }}
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        echo "构建Docker镜像（确保可重复性）..."

        # 清理可能存在的旧镜像
        docker rmi -f ${DOCKERHUB_USERNAME}/${DOCKERHUB_REPO}:latest 2>/dev/null || true
        docker rmi -f ${DOCKERHUB_USERNAME}/${DOCKERHUB_REPO}:${VERSION} 2>/dev/null || true

        # 构建镜像
        docker build \
          --build-arg APP_VERSION=${VERSION} \
          -t ${DOCKERHUB_USERNAME}/${DOCKERHUB_REPO}:latest \
          -t ${DOCKERHUB_USERNAME}/${DOCKERHUB_REPO}:${VERSION} \
          -f ./core/Dockerfile .

        if [ $? -ne 0 ]; then
          echo "❌ Docker构建失败"
          exit 1
        fi

        echo "✅ Docker构建成功"
        echo "镜像大小:"
        docker images | grep ${DOCKERHUB_USERNAME}/${DOCKERHUB_REPO}

        # 记录镜像Digest
        LATEST_DIGEST=$(docker inspect ${DOCKERHUB_USERNAME}/${DOCKERHUB_REPO}:latest --format '{{.Id}}')
        VERSION_DIGEST=$(docker inspect ${DOCKERHUB_USERNAME}/${DOCKERHUB_REPO}:${VERSION} --format '{{.Id}}')

        echo "latest镜像Digest: $LATEST_DIGEST"
        echo "版本号镜像Digest: $VERSION_DIGEST"

    - name: 推送Docker镜像（避免重复推送）
      if: steps.check.outputs.has_update == 'true'
      env:
        DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_REPO }}
        VERSION: ${{ steps.version.outputs.version }}
        DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      run: |
        echo "检查镜像是否已存在..."

        # 获取本地镜像的Digest
        LOCAL_DIGEST=$(docker inspect ${DOCKERHUB_USERNAME}/${DOCKERHUB_REPO}:${VERSION} --format '{{.Id}}')

        # 检查Docker Hub上是否已有相同Digest的镜像
        EXISTING_DIGEST=$(curl -s -u "$DOCKERHUB_USERNAME:$DOCKERHUB_TOKEN" \
          "https://hub.docker.com/v2/repositories/$DOCKERHUB_USERNAME/$DOCKERHUB_REPO/tags/${VERSION}" | \
          jq -r '.digest')

        if [ "$LOCAL_DIGEST" = "$EXISTING_DIGEST" ]; then
          echo "✅ 镜像已存在，跳过推送"
          echo "本地镜像Digest: $LOCAL_DIGEST"
          echo "远程镜像Digest: $EXISTING_DIGEST"
        else
          echo "镜像不存在或已更新，开始推送..."

          # 推送版本号标签
          echo "推送版本号标签: ${VERSION}"
          docker push ${DOCKERHUB_USERNAME}/${DOCKERHUB_REPO}:${VERSION}

          VERSION_PUSH_RESULT=$?

          # 推送latest标签
          if [ $VERSION_PUSH_RESULT -eq 0 ]; then
            echo "推送latest标签..."
            docker push ${DOCKERHUB_USERNAME}/${DOCKERHUB_REPO}:latest

            if [ $? -eq 0 ]; then
              echo "✅ 镜像推送成功"
            else
              echo "❌ latest标签推送失败"
              exit 1
            fi
          else
            echo "❌ 版本号标签推送失败，跳过latest标签推送"
            exit 1
          fi
        fi

    - name: 创建Git标签（仅新版本）
      if: steps.check.outputs.has_update == 'true' && !contains(steps.version.outputs.version, '-fixed')
      run: |
        VERSION_TO_TAG="${{ steps.version.outputs.version }}"

        git config --global user.name 'github-actions'
        git config --global user.email 'actions@github.com'

        TAG_NAME="v${VERSION_TO_TAG}"

        if git ls-remote --tags origin | grep -q "refs/tags/${TAG_NAME}$"; then
          echo "⚠️  远程标签 $TAG_NAME 已存在，跳过创建。"
        else
          echo "创建Git标签: $TAG_NAME"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
          echo "✅ Git标签已创建并推送: $TAG_NAME"
        fi

        echo "版本: $VERSION_TO_TAG"
        echo "镜像: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:$VERSION_TO_TAG"

    - name: 清理旧的Docker镜像
      if: steps.check.outputs.has_update == 'true'
      env:
        DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_REPO }}
      run: |
        echo "开始清理旧的Docker镜像..."

        ALL_TAGS=$(curl -s -u "$DOCKERHUB_USERNAME:$DOCKERHUB_TOKEN" \
          "https://hub.docker.com/v2/repositories/$DOCKERHUB_USERNAME/$DOCKERHUB_REPO/tags?page_size=100" | \
          jq -r '.results[].name')

        VERSION_TAGS=$(echo "$ALL_TAGS" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+(-fixed)?$')

        KEEP_COUNT=10
        TAGS_TO_KEEP=$(echo "$VERSION_TAGS" | sort -V -r | head -n $KEEP_COUNT)
        TAGS_TO_DELETE=$(echo "$VERSION_TAGS" | sort -V -r | tail -n +$((KEEP_COUNT + 1)))

        echo "保留最近 $KEEP_COUNT 个版本:"
        echo "$TAGS_TO_KEEP"
        echo ""
        echo "要删除的旧版本:"
        echo "$TAGS_TO_DELETE"

        if [ -n "$TAGS_TO_DELETE" ]; then
          for TAG in $TAGS_TO_DELETE; do
            echo "删除旧镜像: $TAG"
            curl -s -u "$DOCKERHUB_USERNAME:$DOCKERHUB_TOKEN" \
              -X DELETE \
              "https://hub.docker.com/v2/repositories/$DOCKERHUB_USERNAME/$DOCKERHUB_REPO/tags/$TAG"
          done
          echo "✅ 旧镜像清理完成"
        else
          echo "✅ 没有需要清理的旧镜像"
        fi

    - name: 清理旧的Docker镜像条目（可选）
      if: steps.check.outputs.has_update == 'true'
      env:
        DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_REPO }}
      run: |
        echo "清理旧的Docker镜像条目..."

        # 获取所有标签
        ALL_TAGS=$(curl -s -u "$DOCKERHUB_USERNAME:$DOCKERHUB_TOKEN" \
          "https://hub.docker.com/v2/repositories/$DOCKERHUB_USERNAME/$DOCKERHUB_REPO/tags?page_size=100" | \
          jq -r '.results[].digest')

        # 获取所有镜像条目
        ALL_IMAGES=$(curl -s -u "$DOCKERHUB_USERNAME:$DOCKERHUB_TOKEN" \
          "https://hub.docker.com/v2/repositories/$DOCKERHUB_USERNAME/$DOCKERHUB_REPO" | \
          jq -r '.digest')

        echo "总标签数: $(echo "$ALL_TAGS" | wc -l)"
        echo "总镜像条目数: $(echo "$ALL_IMAGES" | wc -l)"

        # 找出没有标签的镜像条目
        for IMAGE_DIGEST in $ALL_IMAGES; do
          # 检查这个Digest是否有标签指向
          TAG_COUNT=$(echo "$ALL_TAGS" | grep -c "$IMAGE_DIGEST" || true)

          if [ "$TAG_COUNT" -eq 0 ]; then
            echo "删除没有标签的镜像条目: $IMAGE_DIGEST"
            curl -s -u "$DOCKERHUB_USERNAME:$DOCKERHUB_TOKEN" \
              -X DELETE \
              "https://hub.docker.com/v2/repositories/$DOCKERHUB_USERNAME/$DOCKERHUB_REPO/manifests/$IMAGE_DIGEST"
          fi
        done

        echo "✅ 旧的镜像条目清理完成"

    - name: 构建完成通知
      if: steps.check.outputs.has_update == 'true'
      run: |
        BUILD_TYPE="${{ github.event.inputs.build_type }}"
        if [ -z "$BUILD_TYPE" ]; then
          BUILD_TYPE="定时构建"
        fi

        echo "✅ 构建完成！"
        echo "构建类型: $BUILD_TYPE"
        echo "触发原因: ${{ steps.check.outputs.reason }}"
        echo "版本: ${{ steps.version.outputs.version }}"
        echo "镜像: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:${{ steps.version.outputs.version }}"
        echo "最新镜像: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:latest"
        echo ""
        echo "💡 Node.js 版本: 24 (已启用)"
        echo "💡 镜像去重: 已启用"

        if [ "$BUILD_TYPE" = "emergency" ]; then
          echo "🚨 紧急构建完成，镜像已更新！"
        fi
